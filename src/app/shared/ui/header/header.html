<header class="header">
  <div class="container header__inner">
    <a routerLink="/" class="header__brand" (click)="closeMenu()">
      <span class="header__brand-name">Nic P</span>
      <span class="header__brand-sub">The Barber</span>
    </a>

    <nav class="header__nav" [class.open]="menuOpen()" aria-label="Main navigation">
      <a
        routerLink="/"
        routerLinkActive="active"
        [routerLinkActiveOptions]="{ exact: true }"
        class="header__nav-link"
        (click)="closeMenu()">
        Home
      </a>
      <a
        routerLink="/gallery"
        routerLinkActive="active"
        class="header__nav-link"
        (click)="closeMenu()">
        Gallery
      </a>
      <a
        routerLink="/reservations"
        routerLinkActive="active"
        class="header__nav-link header__nav-link--cta"
        (click)="closeMenu()">
        Book Now
      </a>
    </nav>

    <button
      class="header__burger"
      [class.open]="menuOpen()"
      (click)="toggleMenu()"
      aria-label="Toggle navigation menu"
      [attr.aria-expanded]="menuOpen()">
      <span></span>
      <span></span>
      <span></span>
    </button>
  </div>
</header>
